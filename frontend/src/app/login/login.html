<div class="container">
  <div class="card">
    <div class="logo">👤</div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Login or create an account to continue</p>

    <div class="form-group">
      <label>Username</label>
      <input [(ngModel)]="username" placeholder="Enter your username" class="input" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input [(ngModel)]="password" type="password" placeholder="Enter your password" class="input" />
    </div>

    <div class="buttons">
      <button (click)="login()" class="btn btn-primary">🔐 Login</button>
      <button (click)="register()" class="btn btn-secondary">✨ Register</button>
    </div>

    <p class="message" *ngIf="message">{{ message }}</p>
  </div>
</div>
